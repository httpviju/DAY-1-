<!DOCTYPE html>
<html>
<head>
    <title>Password Generator</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }

        input {
            padding: 10px;
            width: 250px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔐 Password Generator</h2>

    <input type="text" id="password" placeholder="Your password" readonly><br>

    <button onclick="generatePassword()">Generate</button>
    <button onclick="copyPassword()">Copy</button>
</div>

<script>
function generatePassword() {
    let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
    let password = "";

    for (let i = 0; i < 12; i++) {
        let randomIndex = Math.floor(Math.random() * chars.length);
        password += chars[randomIndex];
    }

    document.getElementById("password").value = password;
}

function copyPassword() {
    let passField = document.getElementById("password");
    passField.select();
    document.execCommand("copy");
    alert("✅ Password copied!");
}
</script>

</body>
</html>
